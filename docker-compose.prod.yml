version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tracking-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-tracking}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tracking-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/tracking/backend:latest}
    container_name: tracking-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-tracking}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-604800}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tracking-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/tracking/frontend:latest}
    container_name: tracking-frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - tracking-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  tracking-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
