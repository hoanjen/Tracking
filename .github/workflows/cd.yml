name: CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/cd.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ${{ github.repository }}/backend
  IMAGE_FRONTEND: ${{ github.repository }}/frontend

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      deploy_config: ${{ steps.filter.outputs.deploy_config }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/cd.yml'
            frontend:
              - 'frontend/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/cd.yml'
            deploy_config:
              - 'docker-compose.prod.yml'
              - '.github/workflows/cd.yml'

  backend-test:
    name: Backend — Build & Test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: tracking_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build & Test
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/tracking_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-test-secret
          GOOGLE_CLIENT_ID: ci
          GOOGLE_CLIENT_SECRET: ci
          RAPIDAPI_KEY: ci
        run: mvn clean verify

  frontend-test:
    name: Frontend — Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        working-directory: frontend
        env:
          CI: true
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
          REACT_APP_GOOGLE_CLIENT_ID: ${{ vars.REACT_APP_GOOGLE_CLIENT_ID }}
        run: |
          npm ci
          npm run build

  build-backend:
    name: Build & Push Backend Image
    needs: [changes, backend-test]
    if: needs.changes.outputs.backend == 'true' && needs.backend-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Build & Push Frontend Image
    needs: [changes, frontend-test]
    if: needs.changes.outputs.frontend == 'true' && needs.frontend-test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:latest
          build-args: |
            REACT_APP_API_URL=${{ vars.REACT_APP_API_URL }}
            REACT_APP_GOOGLE_CLIENT_ID=${{ vars.REACT_APP_GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: [changes, build-backend, build-frontend]
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to ec2 server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: docker-compose.prod.yml
          target: ~/app/tracking

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY: ${{ env.REGISTRY }}
          BACKEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          FRONTEND_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          DEPLOY_BACKEND: ${{ needs.changes.outputs.backend }}
          DEPLOY_FRONTEND: ${{ needs.changes.outputs.frontend }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: REGISTRY,BACKEND_IMAGE,FRONTEND_IMAGE,DEPLOY_BACKEND,DEPLOY_FRONTEND,GHCR_USERNAME,GHCR_TOKEN,HEAD_SHA
          script: |
            set -e
            cd ~/app/tracking

            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login "$REGISTRY" -u "$GHCR_USERNAME" --password-stdin
            fi

            SERVICES=""

            if [ "$DEPLOY_BACKEND" = "true" ]; then
              sed -i '/^BACKEND_IMAGE=/d' .env
              echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> .env
              docker pull "$BACKEND_IMAGE"
              SERVICES="$SERVICES backend"
            fi

            if [ "$DEPLOY_FRONTEND" = "true" ]; then
              sed -i '/^FRONTEND_IMAGE=/d' .env
              echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> .env
              docker pull "$FRONTEND_IMAGE"
              SERVICES="$SERVICES frontend"
            fi

            docker compose -f docker-compose.prod.yml up -d --no-build $SERVICES
            docker image prune -f

            echo "✅ Deploy $HEAD_SHA thành công:$SERVICES"
